<form class="form">

  <div class="form-group">
    <label>Nombre</label>
    <input
      type="text"
      [(ngModel)]="nombre"
      name="nombre"
      placeholder="Ej: Mouse Gamer">
  </div>

  <div class="form-group">
    <label>Precio</label>
    <input
      type="number"
      [(ngModel)]="precio"
      name="precio"
      placeholder="Ej: 20000">
  </div>

  <button
    type="button"
    [disabled]="!formularioValido"
    (click)="crearProducto()">
    Crear
  </button>

</form>
